[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --disable-warnings
markers =
    unit: unit tests
    guardrail: guardrail / contract tests
    integration: integration tests
    smoke: smoke tests
    e2e: end-to-end tests
    slow: slow tests