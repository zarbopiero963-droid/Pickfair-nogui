[pytest]

# =========================
# Test discovery
# =========================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =========================
# Pytest options
# =========================
addopts =
    -ra
    --strict-markers
    --disable-warnings

# =========================
# Markers (UNIFICATI)
# =========================
markers =

    # --- livelli ---
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    smoke: smoke tests

    # --- qualità / robustezza ---
    failure: failure-path tests
    invariant: invariant tests
    guardrail: structural/contract/architecture guardrails

    # --- sistema ---
    core: test su moduli core critici

    # --- concorrenza / stress ---
    concurrency: test multi-thread o concorrenti
    chaos: chaos tests su moduli core

    # --- resilienza ---
    recovery: restart/reconcile/crash-recovery tests

    # --- rete / gateway ---
    net: network / retry / timeout / HTTP tests