[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --disable-warnings
markers =
    unit: unit tests
    guardrail: guardrail tests
    integration: integration tests
    smoke: smoke tests
    e2e: end-to-end tests
    core: test su moduli core critici
    concurrency: test multi-thread o concorrenti
    failure: test su failure realistici
    invariant: test su invarianti e stati illegali
    chaos: chaos tests su moduli core
    recovery: test di recovery e riapertura stato