name: queue-on-pr-closed

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task file path to complete, e.g. ops/tasks/example.md"
        required: true
        type: string

jobs:
  advance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate manual recovery task_file input
        env:
          TASK_FILE: ${{ github.event.inputs.task_file }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TASK_FILE:-}" ]; then
            echo "task_file input is required" >&2
            exit 1
          fi
          case "$TASK_FILE" in
            *..* | */*/* )
              echo "task_file must not contain .. or nested paths" >&2
              exit 1 ;;
            ops/tasks/*.md) ;;
            *)
              echo "task_file must match ops/tasks/<name>.md" >&2
              exit 1 ;;
          esac

      - name: Move completed task
        env:
          PR_BODY: "Task-File: ${{ github.event.inputs.task_file }}"
        run: python .github/scripts/complete_current_task.py

      - name: Commit queue update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/tasks ops/tasks_done
          git diff --cached --quiet || git commit -m "chore(queue): complete merged task"
          git push
