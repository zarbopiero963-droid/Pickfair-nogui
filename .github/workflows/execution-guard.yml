name: execution-guard

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-module:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.module_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Check core/execution_guard.py presence
        id: module_check
        run: |
          if [ -f "core/execution_guard.py" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  ultra-check:
    needs: check-module
    if: needs.check-module.outputs.exists == 'true'
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "core/execution_guard.py"
      spec_path: "guardrails/specs/core.execution_guard.json"
      contract_path: "guardrails/contracts/core.execution_guard.json"
      state_model_path: "guardrails/state_models/core.execution_guard.json"
      mutation_path: "guardrails/mutations/core.execution_guard.json"
      test_paths: "tests/integration/test_duplication_guard_copy_events.py tests/integration/test_duplication_guard_pattern_events.py"

  skipped-report:
    needs: check-module
    if: needs.check-module.outputs.exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "core/execution_guard.py not present yet -> smart skip"