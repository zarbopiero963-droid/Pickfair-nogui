name: PR Guard (Dynamic Smart)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gh CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate gh
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fetch PR metadata and files
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" > pr_meta.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/files?per_page=100" > pr_files_raw.json

      - name: Run dynamic guardrail
        run: |
          python scripts/guardrail_check.py