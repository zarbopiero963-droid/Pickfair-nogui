name: pr-guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PR metadata (fail-closed)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          LATEST_COMMIT_MESSAGE="$(git log -1 --pretty=%B || true)"
          export LATEST_COMMIT_MESSAGE
          python - <<'PY'
          import json, os, subprocess
          base_ref = os.environ.get("PR_BASE_REF", "") or "main"
          commit_messages = []
          try:
              out = subprocess.check_output(
                  ["git", "log", "--pretty=%B%x1e", f"origin/{base_ref}...HEAD"],
                  text=True,
              )
              commit_messages = [x.strip() for x in out.split("\x1e") if x.strip()]
          except Exception:
              commit_messages = []
          meta = {
              "number": os.environ.get("PR_NUMBER", ""),
              "title": os.environ.get("PR_TITLE", ""),
              "body": os.environ.get("PR_BODY", ""),
              "base_ref": base_ref,
              "head_ref": os.environ.get("PR_HEAD_REF", ""),
              "branch": os.environ.get("PR_HEAD_REF", ""),
              "latest_commit_message": os.environ.get("LATEST_COMMIT_MESSAGE", ""),
              "commit_messages": commit_messages,
          }
          with open("pr_meta.json", "w", encoding="utf-8") as f:
              json.dump(meta, f)
          PY
          git diff --name-only "origin/${PR_BASE_REF:-main}"...HEAD \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            > pr_files_raw.json

      - name: Run guardrail check
        run: |
          set -euo pipefail
          python scripts/guardrail_check.py
