name: PR Guard - Scope Lock

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read changed files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              }
            );
            const names = files.map(f => f.filename);
            core.info(`Changed files (${names.length}):`);
            for (const name of names) core.info(`- ${name}`);

            // Dynamic safety checks (no stale per-task hardcoded allowlist)
            const forbiddenPrefixes = [
              ".github/workflows/",
              "core/",
            ];
            const exceptionExact = new Set([
              ".github/workflows/pr-guard.yml",
              "core/event_bus.py",
              "core/async_db_writer.py",
            ]);

            const invalid = names.filter(name => {
              if (exceptionExact.has(name)) return false;
              return forbiddenPrefixes.some(prefix => name.startsWith(prefix));
            });

            if (invalid.length) {
              core.setFailed(
                `Invalid high-risk changes detected: ${invalid.join(", ")}. ` +
                `Use targeted approval for production/workflow file edits.`
              );
              return;
            }

            core.info("PR guard passed: no disallowed high-risk file edits detected.");
