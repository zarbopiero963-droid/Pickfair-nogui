name: PR Guard (Smart Critical Mode)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PR metadata payloads
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/$REPO/pulls/$PR_NUMBER"

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API" > pr_meta_full.json

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API/files?per_page=100" > pr_files_raw.json

          python - <<'PY'
          import json
          import pathlib

          pr = json.loads(pathlib.Path("pr_meta_full.json").read_text(encoding="utf-8"))
          title = pr.get("title", "") or ""
          body = pr.get("body", "") or ""

          pathlib.Path("pr_meta.json").write_text(
              json.dumps(
                  {
                      "title": title,
                      "body": body,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY

      - name: Run smart PR guardrail
        run: |
          python scripts/guardrail_check.py

      - name: Upload PR guard payloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-guard-payloads
          path: |
            pr_meta.json
            pr_meta_full.json
            pr_files_raw.json