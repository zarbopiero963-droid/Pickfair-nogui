name: PR Guard (Dynamic Smart)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PR metadata payloads
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/$REPO/pulls/$PR_NUMBER"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API" > pr_meta_full.json
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API/files?per_page=100" > pr_files_raw.json

          python - <<'PY'
          import json
          import pathlib
          import re

          pr = json.loads(pathlib.Path("pr_meta_full.json").read_text(encoding="utf-8"))
          title = pr.get("title", "") or ""
          body = pr.get("body", "") or ""
          text = f"{title}\n{body}"
          match = re.search(r"\[TASK:\s*([^\]]+)\]", text)
          task = match.group(1).strip() if match else None

          pathlib.Path("pr_meta.json").write_text(
              json.dumps(
                  {
                      "title": title,
                      "body": body,
                  }
              ),
              encoding="utf-8",
          )
          config = json.loads(pathlib.Path(".guardrails/allowed_scope.json").read_text(encoding="utf-8"))
          known_tasks = set(config.get("tasks", {}).keys())
          should_run_guard = bool(task and task in known_tasks)
          if task and task not in known_tasks:
              print(f"::notice::Skipping scope guard for unknown task '{task}'.")
          if not task:
              print("::notice::No [TASK: ...] tag found; skipping scope guard.")

          out = pathlib.Path("${{ github.output }}")
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"should_run_guard={'true' if should_run_guard else 'false'}\n")
          PY
        id: guard_inputs

      - name: Run dynamic guardrail
        if: steps.guard_inputs.outputs.should_run_guard == 'true'
        run: |
          python scripts/guardrail_check.py
