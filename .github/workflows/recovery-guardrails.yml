name: Recovery Guardrails

on:
  push:
  pull_request:

jobs:
  recovery-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run recovery guardrails
        env:
          PYTHONPATH: .
        run: |
          pytest -q \
            tests/recovery/test_recovery_crash_mid_order.py \
            tests/recovery/test_recovery_restart_with_pending_saga.py \
            tests/recovery/test_recovery_reconcile_post_restart.py \
            tests/recovery/test_recovery_invariants.py