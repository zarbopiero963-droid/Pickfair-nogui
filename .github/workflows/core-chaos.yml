name: Core Chaos

on:
  push:
  pull_request:

jobs:
  core-chaos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run core chaos tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit -q \
            -m "chaos" \
            --maxfail=1 \
            --disable-warnings

      - name: Run core invariant/failure/concurrency focused subset
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit -q \
            -m "core and (concurrency or failure or invariant)"