name: mutation-guardrails

on:
  workflow_call:
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-xdist

      - name: Run mutation guardrails
        run: |
          python scripts/run_mutation_guardrails.py --fail-under 80 --output mutation_guardrails_report.json

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-guardrails-report
          path: mutation_guardrails_report.json 