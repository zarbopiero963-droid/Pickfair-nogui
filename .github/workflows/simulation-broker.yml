name: simulation-broker

on:
  push:
    paths:
      - "simulation_broker.py"
      - "tests/integration/test_simulation_broker*"
  pull_request:
    paths:
      - "simulation_broker.py"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.chk.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: chk
        run: |
          [ -f "simulation_broker.py" ] && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

  run:
    needs: check
    if: needs.check.outputs.exists == 'true'
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "simulation_broker.py"
      test_paths: "tests/integration/test_simulation_broker*"