name: copy-engine

on:
  push:
    paths:
      - "copy_engine.py"
      - "guardrails/specs/copy_engine.json"
      - "guardrails/contracts/copy_engine.json"
      - "guardrails/state_models/copy_engine.json"
      - "guardrails/mutations/copy_engine.json"
      - "tests/integration/test_copy_engine_dispatch.py"
      - "tests/guardrails/test_copy_runtime_entrypoints.py"
  pull_request:
    paths:
      - "copy_engine.py"
      - "guardrails/specs/copy_engine.json"
      - "guardrails/contracts/copy_engine.json"
      - "guardrails/state_models/copy_engine.json"
      - "guardrails/mutations/copy_engine.json"
      - "tests/integration/test_copy_engine_dispatch.py"
      - "tests/guardrails/test_copy_runtime_entrypoints.py"

jobs:
  run:
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "copy_engine.py"
      spec_path: "guardrails/specs/copy_engine.json"
      contract_path: "guardrails/contracts/copy_engine.json"
      state_model_path: "guardrails/state_models/copy_engine.json"
      mutation_path: "guardrails/mutations/copy_engine.json"
      test_paths: "tests/integration/test_copy_engine_dispatch.py tests/guardrails/test_copy_runtime_entrypoints.py"