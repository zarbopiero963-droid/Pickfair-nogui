name: session-manager

on:
  push:
    paths:
      - "session_manager.py"
      - "guardrails/specs/session_manager.json"
      - "guardrails/contracts/session_manager.json"
      - "guardrails/state_models/session_manager.json"
      - "guardrails/mutations/session_manager.json"
      - "tests/**/test_*session*.py"
  pull_request:
    paths:
      - "session_manager.py"
      - "guardrails/specs/session_manager.json"
      - "guardrails/contracts/session_manager.json"
      - "guardrails/state_models/session_manager.json"
      - "guardrails/mutations/session_manager.json"
      - "tests/**/test_*session*.py"

jobs:
  run:
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "session_manager.py"
      spec_path: "guardrails/specs/session_manager.json"
      contract_path: "guardrails/contracts/session_manager.json"
      state_model_path: "guardrails/state_models/session_manager.json"
      mutation_path: "guardrails/mutations/session_manager.json"
      test_paths: "tests"