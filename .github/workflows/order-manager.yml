name: order-manager

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-module:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.module_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Check order_manager.py presence
        id: module_check
        run: |
          if [ -f "order_manager.py" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  ultra-check:
    needs: check-module
    if: needs.check-module.outputs.exists == 'true'
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "order_manager.py"
      spec_path: "guardrails/specs/order_manager.json"
      contract_path: "guardrails/contracts/order_manager.json"
      state_model_path: "guardrails/state_models/order_manager.json"
      mutation_path: "guardrails/mutations/order_manager.json"
      test_paths: "tests/integration/test_order_manager* tests/recovery/test_order_manager*"

  skipped-report:
    needs: check-module
    if: needs.check-module.outputs.exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "order_manager.py not present yet -> smart skip"