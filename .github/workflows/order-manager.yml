name: order-manager

on:
  push:
    paths:
      - "order_manager.py"
      - "guardrails/specs/order_manager.json"
      - "guardrails/contracts/order_manager.json"
      - "guardrails/state_models/order_manager.json"
      - "guardrails/mutations/order_manager.json"
      - "tests/integration/test_order_manager*"
  pull_request:
    paths:
      - "order_manager.py"
      - "tests/integration/test_order_manager*"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.chk.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: chk
        run: |
          [ -f "order_manager.py" ] && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

  run:
    needs: check
    if: needs.check.outputs.exists == 'true'
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "order_manager.py"
      spec_path: "guardrails/specs/order_manager.json"
      contract_path: "guardrails/contracts/order_manager.json"
      state_model_path: "guardrails/state_models/order_manager.json"
      mutation_path: "guardrails/mutations/order_manager.json"
      test_paths: "tests/integration/test_order_manager*"