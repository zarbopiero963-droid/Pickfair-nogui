name: failure-tests

on:
  push:
    paths:
      - "**.py"
      - "tests/failure/**"
  pull_request:

jobs:
  failure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt || true
          pip install pytest

      - name: Run FAILURE tests
        run: |
          pytest tests/failure -q -m "failure"