name: Codex Activity Telegram

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [synchronize, opened, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  notify-codex-comment:
    name: notify-codex-comment
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Notify when Codex comments
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          github-token: ${{ secrets.PICKFAIR_ACTIONS_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comment = context.payload.comment;
            const issue = context.payload.issue;

            const author = comment.user?.login || "";
            const body = comment.body || "";
            const url = comment.html_url;

            const isCodex =
              author.toLowerCase().includes("chatgpt-codex-connector") ||
              author.toLowerCase().includes("codex");

            if (!isCodex) {
              core.info(`Comment author is not Codex: ${author}`);
              return;
            }

            if (body.includes("<!-- pickfair-codex-activity-notified")) {
              core.info("Skipping own marker.");
              return;
            }

            async function sendTelegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;

              if (!token || !chatId) {
                core.warning("Telegram secrets missing; skipping.");
                return;
              }

              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                body: new URLSearchParams({
                  chat_id: chatId,
                  text,
                }),
              });

              if (!response.ok) {
                core.warning(`Telegram failed: ${response.status} ${await response.text()}`);
              }
            }

            await sendTelegram(
              `🤖 Pickfair PR #${issue.number}: Codex ha risposto.\n\n` +
              `Questo significa che Codex ha ricevuto il prompt o ha iniziato/finito un passaggio.\n\n` +
              `${url}`
            );

  notify-pr-push:
    name: notify-pr-push
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Notify when PR head changes
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          github-token: ${{ secrets.PICKFAIR_ACTIONS_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info("No PR payload.");
              return;
            }

            const before = context.payload.before || "";
            const after = context.payload.after || pr.head.sha;
            const sender = context.payload.sender?.login || "unknown";

            async function sendTelegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;

              if (!token || !chatId) {
                core.warning("Telegram secrets missing; skipping.");
                return;
              }

              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                body: new URLSearchParams({
                  chat_id: chatId,
                  text,
                }),
              });

              if (!response.ok) {
                core.warning(`Telegram failed: ${response.status} ${await response.text()}`);
              }
            }

            await sendTelegram(
              `📌 Pickfair PR #${pr.number}: nuova commit sulla branch.\n\n` +
              `Branch: ${pr.head.ref}\n` +
              `Autore evento: ${sender}\n` +
              `Prima: ${before || "n/a"}\n` +
              `Dopo: ${after}\n\n` +
              `Ora i check/reviewer ripartiranno. Il monitor ricontrollerà automaticamente.\n\n` +
              `${pr.html_url}`
            );