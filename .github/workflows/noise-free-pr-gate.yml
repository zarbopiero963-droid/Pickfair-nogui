name: noise-free-pr-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check no merge markers
        run: |
          python scripts/check_merge_markers.py

      - name: Validate guardrails
        run: |
          python scripts/validate_guardrails.py

      - name: Show changed modules
        run: |
          git fetch origin main
          python scripts/ci_changed_modules.py origin/main