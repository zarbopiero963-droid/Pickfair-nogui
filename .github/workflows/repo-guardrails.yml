name: Repo Guardrails

on:
  push:
  pull_request:

jobs:
  repo-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run repo guardrails
        env:
          PYTHONPATH: .
        run: |
          pytest -q \
            tests/guardrails/test_import_smoke_repo.py \
            tests/guardrails/test_contract_snapshot_repo.py \
            tests/guardrails/test_architecture_guardrails.py \
            tests/guardrails/test_no_bypass_paths.py \
            tests/guardrails/test_runtime_entrypoints.py