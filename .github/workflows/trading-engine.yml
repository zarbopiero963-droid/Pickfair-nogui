name: trading-engine

on:
  push:
    paths:
      - "core/trading_engine.py"
      - "guardrails/specs/core.trading_engine.json"
      - "guardrails/contracts/core.trading_engine.json"
      - "guardrails/state_models/core.trading_engine.json"
      - "guardrails/mutations/core.trading_engine.json"
      - "tests/integration/test_trading_engine*"
      - ".github/workflows/trading-engine.yml"
  pull_request:
    paths:
      - "core/trading_engine.py"
      - "guardrails/specs/core.trading_engine.json"
      - "guardrails/contracts/core.trading_engine.json"
      - "guardrails/state_models/core.trading_engine.json"
      - "guardrails/mutations/core.trading_engine.json"
      - "tests/integration/test_trading_engine*"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.chk.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: chk
        run: |
          if [ -f "core/trading_engine.py" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  run:
    needs: check
    if: needs.check.outputs.exists == 'true'
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "core/trading_engine.py"
      spec_path: "guardrails/specs/core.trading_engine.json"
      contract_path: "guardrails/contracts/core.trading_engine.json"
      state_model_path: "guardrails/state_models/core.trading_engine.json"
      mutation_path: "guardrails/mutations/core.trading_engine.json"
      test_paths: "tests/integration/test_trading_engine*"