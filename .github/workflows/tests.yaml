name: Test Suite

on:
  push:
  pull_request:

jobs:
  unit-and-guardrails:
    name: Unit and Guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit and guardrail tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/unit -m "unit or guardrail" --cov=. --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload coverage xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: unit-and-guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run integration tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/integration -m "integration"

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: unit-and-guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run smoke tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/smoke -m "smoke"

  e2e-simulation:
    name: E2E Simulation
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run end-to-end simulation tests
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/e2e -m "e2e"