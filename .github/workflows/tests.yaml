name: Test Suite

on:
  push:
  pull_request:

jobs:

  unit-and-guardrails:
    name: Unit and Guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit -q \
            -m "unit or guardrail" \
            --cov=. \
            --cov-report=term-missing

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run integration tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/integration -q -m "integration"

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-and-guardrails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run smoke tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/smoke -q -m "smoke"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run e2e tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/e2e -q -m "e2e"