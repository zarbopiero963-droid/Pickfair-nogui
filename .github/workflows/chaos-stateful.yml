name: chaos-stateful

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  chaos-stateful:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest

      - name: Run chaos+stateful focused suite
        run: |
          pytest -q -x tests/chaos/test_chaos_stateful_timeout_restart_reconcile.py
          pytest -q -x tests/chaos/test_chaos_stateful_partial_failure_replay.py
          pytest -q -x tests/chaos/test_chaos_stateful_concurrent_restart_integrity.py
          pytest -q -x tests/chaos/test_chaos_stateful_diagnostics_recovery.py
          pytest -q -x tests/chaos/test_chaos_stateful_reconcile_multi_pass.py
          pytest -q -x tests/chaos/test_chaos_stateful_dedup_after_restart.py

      - name: Run supporting integration test
        run: |
          if [ -f tests/integration/test_betfair_timeout_and_ghost_orders.py ]; then
            pytest -q -x tests/integration/test_betfair_timeout_and_ghost_orders.py
          else
            echo "No supporting integration test found"
          fi

      - name: Run recovery suite
        run: |
          if [ -d tests/recovery ]; then
            pytest -q -x tests/recovery
          else
            echo "No recovery tests directory found"
          fi

      - name: Run reconciliation suite
        run: |
          if [ -d tests/reconciliation ]; then
            pytest -q -x tests/reconciliation
          else
            echo "No reconciliation tests directory found"
          fi