name: network-tests

on:
  push:
    paths:
      - "**.py"
      - "tests/net/**"
  pull_request:

jobs:
  net:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements-test.txt

      - name: Run NETWORK tests
        run: |
          pytest tests/net -q -m "net"