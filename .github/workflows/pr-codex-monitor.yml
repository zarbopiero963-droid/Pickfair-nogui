name: PR Codex Monitor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to monitor"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read
  actions: read
  statuses: read

concurrency:
  group: pr-codex-monitor-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    name: pr-codex-monitor
    runs-on: ubuntu-latest

    steps:
      - name: Monitor PR checks and review comments
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_INPUT: ${{ github.event.inputs.pr_number || '' }}
          AI_REVIEWERS: sourcery-ai,sourcery-ai[bot],coderabbitai,coderabbitai[bot],codacy-production,deepsource-io,gitar-bot,gitar-bot[bot],chatgpt-codex-connector,chatgpt-codex-connector[bot]
        with:
          github-token: ${{ secrets.PICKFAIR_ACTIONS_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function sendTelegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;

              if (!token || !chatId) {
                core.warning("Telegram secrets missing; skipping Telegram notification.");
                return;
              }

              const url = `https://api.telegram.org/bot${token}/sendMessage`;
              const body = new URLSearchParams();
              body.append("chat_id", chatId);
              body.append("text", text);

              const response = await fetch(url, {
                method: "POST",
                body,
              });

              if (!response.ok) {
                const errorText = await response.text();
                core.warning(`Telegram notification failed: ${response.status} ${errorText}`);
              }
            }

            async function getExistingIssueComments(issueNumber) {
              return await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function postIssueCommentOnce(issueNumber, marker, body) {
              const existingComments = await getExistingIssueComments(issueNumber);

              const alreadyPosted = existingComments.some(comment =>
                comment.body && comment.body.includes(marker)
              );

              if (alreadyPosted) {
                core.info(`Issue comment marker already exists: ${marker}`);
                return false;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });

              return true;
            }

            async function replyToReviewCommentOnce(prNumber, thread, marker, body) {
              const comments = thread.comments.nodes || [];

              const alreadyPosted = comments.some(comment =>
                comment.body && comment.body.includes(marker)
              );

              if (alreadyPosted) {
                core.info(`Review thread marker already exists: ${marker}`);
                return false;
              }

              const firstComment = comments[0];

              if (!firstComment || !firstComment.databaseId) {
                core.warning(`Cannot reply to thread ${thread.id}: missing first comment databaseId.`);
                return false;
              }

              await github.rest.pulls.createReplyForReviewComment({
                owner,
                repo,
                pull_number: prNumber,
                comment_id: firstComment.databaseId,
                body,
              });

              return true;
            }

            async function getPrNumbersToMonitor() {
              if (context.payload.pull_request) {
                return [context.payload.pull_request.number];
              }

              if (context.payload.issue && context.payload.issue.pull_request) {
                return [context.payload.issue.number];
              }

              if (context.eventName === "workflow_dispatch") {
                const input = process.env.PR_INPUT;
                if (input && input.trim()) {
                  return [Number(input)];
                }
              }

              const openPrs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });

              return openPrs
                .filter(pr =>
                  pr.title.includes("[TASK:") ||
                  pr.head.ref.startsWith("codex/") ||
                  pr.head.ref.startsWith("feat/")
                )
                .map(pr => pr.number);
            }

            async function getAllChecksForSha(headSha) {
              const checksResponse = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const checkRuns = (checksResponse.data.check_runs || []).map(check => ({
                name: check.name,
                status: check.status,
                conclusion: check.conclusion,
                html_url: check.html_url,
                source: "check_run",
              }));

              const statusResponse = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              });

              const statuses = (statusResponse.data.statuses || []).map(status => ({
                name: status.context,
                status: status.state === "pending" ? "pending" : "completed",
                conclusion:
                  status.state === "success" ? "success" :
                  status.state === "failure" ? "failure" :
                  status.state === "error" ? "failure" :
                  status.state === "pending" ? null :
                  status.state,
                html_url: status.target_url,
                source: "status",
              }));

              return [...checkRuns, ...statuses].filter(check => {
                const name = (check.name || "").toLowerCase();
                return !name.includes("pr-codex-monitor");
              });
            }

            async function getReviewThreads(prNumber) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        nodes {
                          id
                          isResolved
                          isOutdated
                          path
                          line
                          comments(first: 30) {
                            nodes {
                              id
                              databaseId
                              body
                              url
                              createdAt
                              author {
                                login
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                owner,
                repo,
                number: prNumber,
              });

              return result.repository.pullRequest.reviewThreads.nodes || [];
            }

            function getActiveAiThreads(threads) {
              const aiReviewers = process.env.AI_REVIEWERS
                .split(",")
                .map(item => item.trim().toLowerCase())
                .filter(Boolean);

              return threads.filter(thread => {
                if (thread.isResolved || thread.isOutdated) return false;

                const firstComment = thread.comments.nodes[0];
                const author = firstComment?.author?.login?.toLowerCase();

                if (!author) return false;

                return aiReviewers.includes(author);
              });
            }

            async function monitorPr(prNumber) {
              if (!prNumber || Number.isNaN(prNumber)) {
                core.info("Invalid PR number. Skipping.");
                return;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });

              if (pr.state !== "open") {
                core.info(`PR #${prNumber} is not open. Skipping.`);
                return;
              }

              const headSha = pr.head.sha;
              const headBranch = pr.head.ref;
              const title = pr.title;
              const prUrl = pr.html_url;

              core.info(`Monitoring PR #${prNumber}: ${title}`);
              core.info(`Head branch: ${headBranch}`);
              core.info(`Head SHA: ${headSha}`);

              const checkRuns = await getAllChecksForSha(headSha);

              if (checkRuns.length === 0) {
                const marker = `<!-- pickfair-codex-monitor:no-checks:v5:${headSha} -->`;

                const body = [
                  marker,
                  "⚠️ PR monitor: nessun check trovato",
                  "",
                  `PR: #${prNumber}`,
                  `Titolo: ${title}`,
                  `Branch: ${headBranch}`,
                  `Head SHA: ${headSha}`,
                  "",
                  "Non ho trovato check run/status per questo commit.",
                  "Verifica manualmente su GitHub prima di fare micro-audit o merge."
                ].join("\n");

                const posted = await postIssueCommentOnce(prNumber, marker, body);

                if (posted) {
                  await sendTelegram(
                    `⚠️ Pickfair PR #${prNumber}: nessun check trovato.\n\n` +
                    `Verifica manualmente su GitHub.\n\n${prUrl}`
                  );
                }

                return;
              }

              const pending = checkRuns.filter(check =>
                ["queued", "in_progress", "waiting", "requested", "pending"].includes(check.status) ||
                check.conclusion === null
              );

              if (pending.length > 0) {
                core.info(`Checks still pending/in progress: ${pending.map(c => c.name).join(", ")}`);
                return;
              }

              const failed = checkRuns.filter(check =>
                check.status === "completed" &&
                ["failure", "cancelled", "timed_out", "action_required", "startup_failure"].includes(check.conclusion)
              );

              const threads = await getReviewThreads(prNumber);
              const activeAiThreads = getActiveAiThreads(threads);

              const hasFailedChecks = failed.length > 0;
              const hasActiveReviewComments = activeAiThreads.length > 0;

              if (hasFailedChecks || hasActiveReviewComments) {
                const issueMarker = `<!-- pickfair-codex-monitor:needs-action:v5:${headSha} -->`;
                const replyMarker = `<!-- pickfair-codex-monitor:review-thread-forwarded:v5:${headSha} -->`;

                if (hasActiveReviewComments) {
                  for (const thread of activeAiThreads) {
                    const firstComment = thread.comments.nodes[0];
                    const author = firstComment?.author?.login || "unknown";

                    const replyBody = [
                      replyMarker,
                      "🟡 Rilevato dal monitor automatico.",
                      "",
                      "Questo review comment AI è stato inoltrato a Codex nel commento generale della PR per la risoluzione.",
                      "",
                      `Autore: ${author}`,
                      `File: ${thread.path || "n/a"}`,
                      `Line: ${thread.line || "n/a"}`,
                      `PR head SHA: ${headSha}`,
                      "",
                      "Codex deve rispondere qui con:",
                      "",
                      'Fatto in commit <SHA>',
                      "",
                      "oppure indicare skipped con motivo se il commento è outdated o già risolto nel codice corrente."
                    ].join("\n");

                    await replyToReviewCommentOnce(prNumber, thread, replyMarker, replyBody);
                  }
                }

                const failedText = hasFailedChecks
                  ? failed.map(check =>
                      `- ${check.name}: ${check.conclusion}\n  ${check.html_url || ""}`
                    ).join("\n")
                  : "Nessun check rosso rilevato.";

                const commentsText = hasActiveReviewComments
                  ? activeAiThreads.map((thread, index) => {
                      const firstComment = thread.comments.nodes[0];

                      return [
                        `### ${index + 1}. ${firstComment.author.login}`,
                        `Thread ID: ${thread.id}`,
                        `File: ${thread.path || "n/a"}`,
                        `Line: ${thread.line || "n/a"}`,
                        `URL: ${firstComment.url}`,
                        "",
                        firstComment.body,
                      ].join("\n");
                    }).join("\n\n---\n\n")
                  : "Nessun review comment AI attivo rilevato.";

                const body = [
                  issueMarker,
                  "@codex",
                  "",
                  "PR NEEDS FIXES — CHECKS AND REVIEW COMMENTS",
                  "",
                  `Repo: ${owner}/${repo}`,
                  `PR: #${prNumber}`,
                  `Branch: ${headBranch}`,
                  `Head SHA: ${headSha}`,
                  "",
                  "Stato monitor:",
                  hasFailedChecks ? "⛔ Ci sono workflow/check rossi." : "✅ Nessun workflow/check rosso rilevato.",
                  hasActiveReviewComments ? "🟡 Ci sono review comment AI attivi." : "✅ Nessun review comment AI attivo rilevato.",
                  "",
                  "Workflow/check rossi:",
                  "",
                  failedText,
                  "",
                  "Review comment AI attivi:",
                  "",
                  commentsText,
                  "",
                  "Regole:",
                  "- Lavora solo sulla PR corrente.",
                  "- Non aprire una nuova PR.",
                  "- Non fare merge.",
                  "- Correggi tutti i workflow/check rossi indicati.",
                  "- Risolvi tutti i review comment AI attivi indicati.",
                  "- Non modificare file fuori scope rispetto alla PR.",
                  "- Per ogni review comment realmente risolto, rispondi nel relativo thread GitHub:",
                  '  "Fatto in commit <SHA>"',
                  "- Se un commento è outdated o già risolto nel codice corrente, annotalo come skipped con motivo.",
                  "- Devi aggiornare realmente la branch GitHub della PR.",
                  "- Pusha/applica le modifiche sulla stessa branch della PR.",
                  "- Non basta preparare un commit nel task Codex.",
                  "- Prima di rispondere, verifica che la PR head SHA sia cambiata rispetto a quella iniziale.",
                  "- Se non puoi aggiornare la branch automaticamente, rispondi esattamente: NEEDS_MANUAL_UPDATE_BRANCH.",
                  "- Quando hai corretto, rispondi nel commento generale con:",
                  "  1. cosa hai fatto",
                  "  2. commit SHA",
                  "  3. nuova PR head SHA",
                  "  4. quali review comment hai commentato con Fatto in commit <SHA>",
                  "  5. stato finale DONE / PARTIAL / NOT DONE"
                ].join("\n");

                const posted = await postIssueCommentOnce(prNumber, issueMarker, body);

                if (posted) {
                  await sendTelegram(
                    `🟡 Pickfair PR #${prNumber}: azione Codex richiesta.\n\n` +
                    `${hasFailedChecks ? "⛔ Check/workflow rossi\n" : "✅ Check senza rossi\n"}` +
                    `${hasActiveReviewComments ? "🟡 Review comment AI attivi\n" : "✅ Nessun review comment AI attivo\n"}\n` +
                    `Ho commentato la PR con @codex e, se presenti, ho marcato i review comment come inoltrati.\n\n` +
                    `${prUrl}`
                  );
                }

                return;
              }

              const marker = `<!-- pickfair-codex-monitor:ready-for-audit:v5:${headSha} -->`;

              const body = [
                marker,
                "✅ PR pronta per micro-audit",
                "",
                `PR: #${prNumber}`,
                `Titolo: ${title}`,
                `Branch: ${headBranch}`,
                `Head SHA: ${headSha}`,
                "",
                "Stato:",
                "✅ Tutti i workflow/check sono completati",
                "✅ Nessun check rosso rilevato",
                "✅ Nessun review thread AI attivo non risolto/non outdated",
                "",
                "Ora manda a Codex il micro-audit read-only."
              ].join("\n");

              const posted = await postIssueCommentOnce(prNumber, marker, body);

              if (posted) {
                await sendTelegram(
                  `✅ Pickfair PR #${prNumber} pronta per micro-audit.\n\n` +
                  `✅ Workflow/check completi\n` +
                  `✅ Nessun check rosso\n` +
                  `✅ Nessun commento AI attivo\n\n` +
                  `Ora manda il micro-audit a Codex.\n\n${prUrl}`
                );
              }
            }

            const prNumbers = await getPrNumbersToMonitor();

            if (!prNumbers.length) {
              core.info("No PRs to monitor.");
              return;
            }

            for (const prNumber of prNumbers) {
              await monitorPr(prNumber);
            }