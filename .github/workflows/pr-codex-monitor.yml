name: PR Codex Monitor

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional reason for running disabled monitor"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pr-codex-monitor-disabled
  cancel-in-progress: true

jobs:
  disabled:
    name: Monitor disabled
    runs-on: ubuntu-latest

    steps:
      - name: Explain disabled state
        run: |
          echo "PR Codex Monitor is disabled."
          echo "This workflow no longer comments @codex."
          echo "This workflow no longer runs on pull_request, check_run, status, or schedule."
          echo "Reason: avoid creating duplicate Codex tasks/chats from GitHub mentions."