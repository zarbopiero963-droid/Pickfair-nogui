name: PR Codex Monitor

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to monitor"
        required: true
        type: string

  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  status:

  check_run:
    types: [completed, rerequested, requested_action]

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read
  statuses: read
  actions: read

concurrency:
  group: pr-codex-monitor-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.sha }}
  cancel-in-progress: false

jobs:
  monitor:
    name: Monitor PR checks, logs and review comments
    runs-on: ubuntu-latest

    steps:
      - name: Monitor PR and notify Codex
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          github-token: ${{ secrets.PICKFAIR_ACTIONS_TOKEN }}
          script: |
            const crypto = require("crypto");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFull = `${owner}/${repo}`;

            const MONITOR_VERSION = "v8";
            const COMMENT_MARKER_PREFIX = "<!-- pickfair-codex-monitor-v8";
            const READY_MARKER_PREFIX = "<!-- pickfair-codex-monitor-v8-ready";
            const MANUAL_MARKER_PREFIX = "<!-- pickfair-codex-monitor-v8-manual-update";

            const MAX_FAILED_WORKFLOWS = 8;
            const MAX_FAILED_JOBS_PER_WORKFLOW = 4;
            const MAX_LOG_SNIPPET_CHARS = 18000;
            const MAX_TOTAL_COMMENT_CHARS = 58000;
            const REMINDER_MINUTES = 60;

            function nowIso() {
              return new Date().toISOString();
            }

            function sha256(text) {
              return crypto.createHash("sha256").update(text).digest("hex");
            }

            function shortSha(sha) {
              return sha ? sha.slice(0, 12) : "n/a";
            }

            function isCodexLogin(login) {
              const x = (login || "").toLowerCase();
              return x.includes("codex") || x.includes("chatgpt-codex-connector");
            }

            function cleanBody(text) {
              return String(text || "")
                .replace(/\r/g, "")
                .replace(/[ \t]+$/gm, "")
                .trim();
            }

            function truncate(text, maxChars) {
              text = String(text || "");
              if (text.length <= maxChars) return text;
              return text.slice(0, maxChars) + "\n\n...[TRUNCATED]...";
            }

            async function sendTelegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chatId = process.env.TELEGRAM_CHAT_ID;

              if (!token || !chatId) {
                core.warning("Telegram secrets missing; skipping Telegram.");
                return;
              }

              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                body: new URLSearchParams({
                  chat_id: chatId,
                  text: truncate(text, 3900),
                  disable_web_page_preview: "false",
                }),
              });

              if (!response.ok) {
                core.warning(`Telegram failed: ${response.status} ${await response.text()}`);
              }
            }

            async function getPrNumber() {
              if (context.payload.pull_request?.number) {
                return context.payload.pull_request.number;
              }

              if (context.payload.inputs?.pr_number) {
                return Number(context.payload.inputs.pr_number);
              }

              if (context.payload.check_run?.pull_requests?.length) {
                return context.payload.check_run.pull_requests[0].number;
              }

              if (context.payload.workflow_run?.pull_requests?.length) {
                return context.payload.workflow_run.pull_requests[0].number;
              }

              if (context.payload.branches?.length) {
                core.info("Status event has branches, but no direct PR number.");
              }

              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });

              if (prs.length === 1) {
                return prs[0].number;
              }

              core.info(`Open PR count: ${prs.length}. Cannot infer PR safely.`);
              return null;
            }

            async function getPr(prNumber) {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              return data;
            }

            async function listIssueComments(prNumber) {
              return await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
            }

            async function addIssueComment(prNumber, body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

            function parseMarkerTime(body, markerPrefix) {
              const text = String(body || "");
              if (!text.includes(markerPrefix)) return null;
              const m = text.match(/at=([^ >]+)\s*-->/);
              if (!m) return null;
              const d = new Date(m[1]);
              return Number.isNaN(d.getTime()) ? null : d;
            }

            function hasRecentMarker(comments, markerPrefix, hash, minutes) {
              const now = Date.now();

              for (const c of comments) {
                const body = c.body || "";
                if (!body.includes(markerPrefix)) continue;
                if (hash && !body.includes(`hash=${hash}`)) continue;

                const at = parseMarkerTime(body, markerPrefix);
                if (!at) continue;

                const ageMin = (now - at.getTime()) / 60000;
                if (ageMin < minutes) return true;
              }

              return false;
            }

            function hasAnyMarker(comments, markerPrefix, hash) {
              return comments.some(c => {
                const body = c.body || "";
                if (!body.includes(markerPrefix)) return false;
                if (hash && !body.includes(`hash=${hash}`)) return false;
                return true;
              });
            }

            async function getCombinedStatuses(headSha) {
              try {
                const { data } = await github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                });

                return (data.statuses || []).map(s => ({
                  type: "status",
                  name: s.context,
                  state: s.state,
                  conclusion: s.state,
                  url: s.target_url || s.url || "",
                  description: s.description || "",
                }));
              } catch (err) {
                core.warning(`Could not read combined statuses: ${err.message}`);
                return [];
              }
            }

            async function getCheckRuns(headSha) {
              try {
                const runs = await github.paginate(github.rest.checks.listForRef, {
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                });

                return runs.map(r => ({
                  type: "check_run",
                  id: r.id,
                  name: r.name,
                  status: r.status,
                  conclusion: r.conclusion,
                  url: r.html_url || r.details_url || "",
                  details_url: r.details_url || "",
                  output_title: r.output?.title || "",
                  output_summary: r.output?.summary || "",
                  output_text: r.output?.text || "",
                }));
              } catch (err) {
                core.warning(`Could not read check runs: ${err.message}`);
                return [];
              }
            }

            async function getCheckAnnotations(checkRunId) {
              try {
                const annotations = await github.paginate(github.rest.checks.listAnnotations, {
                  owner,
                  repo,
                  check_run_id: checkRunId,
                  per_page: 100,
                });

                return annotations.slice(0, 20).map(a => ({
                  path: a.path,
                  start_line: a.start_line,
                  end_line: a.end_line,
                  annotation_level: a.annotation_level,
                  message: a.message,
                  title: a.title,
                  raw_details: a.raw_details,
                }));
              } catch (err) {
                core.info(`No annotations for check ${checkRunId}: ${err.message}`);
                return [];
              }
            }

            async function getWorkflowRunsForHead(headSha) {
              try {
                const { data } = await github.request(
                  "GET /repos/{owner}/{repo}/actions/runs",
                  {
                    owner,
                    repo,
                    head_sha: headSha,
                    per_page: 50,
                  }
                );

                return data.workflow_runs || [];
              } catch (err) {
                core.warning(`Could not read workflow runs: ${err.message}`);
                return [];
              }
            }

            async function getWorkflowJobs(runId) {
              try {
                const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                  owner,
                  repo,
                  run_id: runId,
                  per_page: 100,
                });
                return jobs || [];
              } catch (err) {
                core.warning(`Could not read jobs for run ${runId}: ${err.message}`);
                return [];
              }
            }

            async function downloadJobLog(jobId) {
              try {
                const response = await github.request(
                  "GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs",
                  {
                    owner,
                    repo,
                    job_id: jobId,
                  }
                );

                if (typeof response.data === "string") {
                  return response.data;
                }

                if (response.data instanceof ArrayBuffer) {
                  return Buffer.from(response.data).toString("utf8");
                }

                if (Buffer.isBuffer(response.data)) {
                  return response.data.toString("utf8");
                }

                return String(response.data || "");
              } catch (err) {
                core.warning(`Could not download logs for job ${jobId}: ${err.message}`);
                return "";
              }
            }

            function extractUsefulLogSnippet(logText) {
              const text = String(logText || "").replace(/\r/g, "");
              if (!text.trim()) return "";

              const lines = text.split("\n");

              const patterns = [
                /FAILURES/i,
                /FAILED /i,
                /AssertionError/i,
                /Traceback/i,
                /Error:/i,
                /ERROR/i,
                /Process completed with exit code/i,
                /Blocking issues/i,
                /failing metrics/i,
                /Signature cambiata/i,
                /expected=.*actual=/i,
              ];

              const hitIndexes = [];
              for (let i = 0; i < lines.length; i++) {
                if (patterns.some(p => p.test(lines[i]))) {
                  hitIndexes.push(i);
                }
              }

              if (!hitIndexes.length) {
                return truncate(lines.slice(-120).join("\n"), MAX_LOG_SNIPPET_CHARS);
              }

              const ranges = [];
              for (const idx of hitIndexes.slice(0, 12)) {
                const start = Math.max(0, idx - 20);
                const end = Math.min(lines.length, idx + 50);
                ranges.push([start, end]);
              }

              ranges.sort((a, b) => a[0] - b[0]);

              const merged = [];
              for (const r of ranges) {
                const last = merged[merged.length - 1];
                if (!last || r[0] > last[1] + 5) {
                  merged.push(r);
                } else {
                  last[1] = Math.max(last[1], r[1]);
                }
              }

              const out = [];
              for (const [start, end] of merged.slice(0, 5)) {
                out.push(`--- log lines ${start + 1}-${end} ---`);
                out.push(lines.slice(start, end).join("\n"));
              }

              return truncate(out.join("\n"), MAX_LOG_SNIPPET_CHARS);
            }

            async function getFailedWorkflowDetails(headSha) {
              const runs = await getWorkflowRunsForHead(headSha);

              const failedRuns = runs
                .filter(r => {
                  const badConclusion = ["failure", "timed_out", "cancelled", "action_required"].includes(r.conclusion || "");
                  const pending = ["queued", "in_progress", "waiting", "requested"].includes(r.status || "");
                  return badConclusion || pending;
                })
                .slice(0, MAX_FAILED_WORKFLOWS);

              const details = [];

              for (const run of failedRuns) {
                const jobs = await getWorkflowJobs(run.id);

                const badJobs = jobs
                  .filter(j => {
                    const badConclusion = ["failure", "timed_out", "cancelled", "action_required"].includes(j.conclusion || "");
                    const pending = ["queued", "in_progress", "waiting", "requested"].includes(j.status || "");
                    return badConclusion || pending;
                  })
                  .slice(0, MAX_FAILED_JOBS_PER_WORKFLOW);

                const jobDetails = [];

                for (const job of badJobs) {
                  let snippet = "";

                  if (job.conclusion === "failure") {
                    const log = await downloadJobLog(job.id);
                    snippet = extractUsefulLogSnippet(log);
                  }

                  jobDetails.push({
                    id: job.id,
                    name: job.name,
                    status: job.status,
                    conclusion: job.conclusion,
                    html_url: job.html_url,
                    snippet,
                    failed_steps: (job.steps || [])
                      .filter(s => ["failure", "timed_out", "cancelled", "action_required"].includes(s.conclusion || ""))
                      .map(s => ({
                        name: s.name,
                        number: s.number,
                        conclusion: s.conclusion,
                      })),
                  });
                }

                details.push({
                  id: run.id,
                  name: run.name,
                  status: run.status,
                  conclusion: run.conclusion,
                  html_url: run.html_url,
                  event: run.event,
                  jobs: jobDetails,
                });
              }

              return details;
            }

            async function getReviewThreads(prNumber) {
              const query = `
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    pullRequest(number:$number) {
                      reviewThreads(first:100) {
                        nodes {
                          id
                          isResolved
                          isOutdated
                          path
                          line
                          comments(first:20) {
                            nodes {
                              id
                              databaseId
                              body
                              url
                              createdAt
                              author {
                                login
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              try {
                const data = await github.graphql(query, {
                  owner,
                  repo,
                  number: prNumber,
                });

                const nodes = data.repository.pullRequest.reviewThreads.nodes || [];

                return nodes.map(t => ({
                  id: t.id,
                  isResolved: t.isResolved,
                  isOutdated: t.isOutdated,
                  path: t.path,
                  line: t.line,
                  comments: t.comments.nodes || [],
                }));
              } catch (err) {
                core.warning(`Could not read review threads: ${err.message}`);
                return [];
              }
            }

            function summarizeActiveReviewThreads(threads, headSha) {
              const active = [];

              for (const t of threads) {
                if (t.isResolved) continue;
                if (t.isOutdated) continue;

                const first = t.comments?.[0];
                if (!first) continue;

                const author = first.author?.login || "";
                const body = cleanBody(first.body || "");

                const isAiComment =
                  isCodexLogin(author) ||
                  author.toLowerCase().includes("coderabbit") ||
                  author.toLowerCase().includes("sourcery") ||
                  author.toLowerCase().includes("gitar") ||
                  body.toLowerCase().includes("codacy") ||
                  body.toLowerCase().includes("deepsource");

                if (!isAiComment) continue;

                active.push({
                  thread_id: t.id,
                  author,
                  path: t.path,
                  line: t.line,
                  url: first.url,
                  body: truncate(body, 1800),
                  databaseId: first.databaseId,
                });
              }

              return active.slice(0, 30);
            }

            function checkIsBad(c) {
              if (c.type === "status") {
                return ["error", "failure"].includes(c.state);
              }

              if (c.status && c.status !== "completed") return false;

              return ["failure", "timed_out", "cancelled", "action_required"].includes(c.conclusion || "");
            }

            function checkIsPending(c) {
              if (c.type === "status") {
                return ["pending"].includes(c.state);
              }

              return c.status && c.status !== "completed";
            }

            function formatChecks(checks) {
              return checks.map(c => {
                const state = c.type === "status" ? c.state : `${c.status || ""}/${c.conclusion || ""}`;
                const url = c.url || c.details_url || "";
                return `- ${c.name}: ${state}${url ? `\n  ${url}` : ""}${c.description ? `\n  ${c.description}` : ""}`;
              }).join("\n");
            }

            function formatAnnotations(annotationMap) {
              const chunks = [];

              for (const [checkName, annotations] of Object.entries(annotationMap)) {
                if (!annotations.length) continue;

                chunks.push(`### ${checkName}`);

                for (const a of annotations.slice(0, 12)) {
                  chunks.push(
                    `- ${a.annotation_level || "annotation"} ${a.path || ""}:${a.start_line || ""}` +
                    `${a.title ? ` — ${a.title}` : ""}` +
                    `\n  ${truncate(cleanBody(a.message || a.raw_details || ""), 700)}`
                  );
                }
              }

              return chunks.join("\n\n");
            }

            function formatWorkflowDetails(details) {
              const chunks = [];

              for (const run of details) {
                chunks.push(`## ${run.name}`);
                chunks.push(`Run: ${run.html_url}`);
                chunks.push(`Status: ${run.status} / ${run.conclusion}`);

                for (const job of run.jobs || []) {
                  chunks.push(`### Job: ${job.name}`);
                  chunks.push(`Job status: ${job.status} / ${job.conclusion}`);
                  if (job.html_url) chunks.push(`Job URL: ${job.html_url}`);

                  if (job.failed_steps?.length) {
                    chunks.push("Failed steps:");
                    for (const s of job.failed_steps) {
                      chunks.push(`- #${s.number} ${s.name}: ${s.conclusion}`);
                    }
                  }

                  if (job.snippet) {
                    chunks.push("Relevant log excerpt:");
                    chunks.push("```text");
                    chunks.push(truncate(job.snippet, 9000));
                    chunks.push("```");
                  }
                }
              }

              return chunks.join("\n\n");
            }

            function formatReviewThreads(activeThreads) {
              if (!activeThreads.length) return "";

              const chunks = [];

              for (const t of activeThreads) {
                chunks.push(
                  `- ${t.path}:${t.line || "n/a"} by ${t.author}\n` +
                  `  ${t.url}\n` +
                  `  ${truncate(t.body.replace(/\n/g, "\n  "), 1800)}`
                );
              }

              return chunks.join("\n\n");
            }

            async function main() {
              const prNumber = await getPrNumber();

              if (!prNumber) {
                core.info("No PR number found. Exiting.");
                return;
              }

              const pr = await getPr(prNumber);

              if (pr.state !== "open") {
                core.info(`PR #${prNumber} is not open. Exiting.`);
                return;
              }

              if (pr.draft) {
                core.info(`PR #${prNumber} is draft. Exiting.`);
                return;
              }

              const headSha = pr.head.sha;
              const branch = pr.head.ref;
              const prUrl = pr.html_url;

              core.info(`Monitoring PR #${prNumber} head ${headSha}`);

              const comments = await listIssueComments(prNumber);

              const latestCodexComment = comments
                .filter(c => isCodexLogin(c.user?.login))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              const latestCodexNeedsManualUpdate =
                latestCodexComment &&
                String(latestCodexComment.body || "").includes("NEEDS_MANUAL_UPDATE_BRANCH");

              const checks = [
                ...(await getCombinedStatuses(headSha)),
                ...(await getCheckRuns(headSha)),
              ];

              const failedChecks = checks.filter(checkIsBad);
              const pendingChecks = checks.filter(checkIsPending);

              const annotationMap = {};
              for (const c of failedChecks) {
                if (c.type === "check_run" && c.id) {
                  const annotations = await getCheckAnnotations(c.id);
                  if (annotations.length) annotationMap[c.name] = annotations;
                }
              }

              const workflowDetails = await getFailedWorkflowDetails(headSha);

              const reviewThreads = await getReviewThreads(prNumber);
              const activeReviewThreads = summarizeActiveReviewThreads(reviewThreads, headSha);

              const statePayload = {
                pr: prNumber,
                headSha,
                failedChecks: failedChecks.map(c => `${c.name}:${c.status || c.state}:${c.conclusion || ""}`),
                pendingChecks: pendingChecks.map(c => `${c.name}:${c.status || c.state}:${c.conclusion || ""}`),
                activeReviewThreads: activeReviewThreads.map(t => `${t.path}:${t.line}:${t.author}:${t.url}`),
                workflowFailures: workflowDetails.map(r => `${r.name}:${r.status}:${r.conclusion}:${(r.jobs || []).map(j => `${j.name}:${j.conclusion}`).join(",")}`),
              };

              const stateHash = sha256(JSON.stringify(statePayload)).slice(0, 16);
              const readyHash = sha256(`ready:${prNumber}:${headSha}`).slice(0, 16);
              const manualHash = sha256(`manual:${prNumber}:${headSha}:${latestCodexComment?.id || ""}`).slice(0, 16);

              const hasFailures = failedChecks.length > 0 || activeReviewThreads.length > 0;
              const hasPending = pendingChecks.length > 0;

              if (!hasFailures && !hasPending) {
                if (!hasAnyMarker(comments, READY_MARKER_PREFIX, readyHash)) {
                  const readyText =
                    `${READY_MARKER_PREFIX} hash=${readyHash} head=${headSha} at=${nowIso()} -->\n\n` +
                    `✅ PR #${prNumber} pronta per micro-audit.\n\n` +
                    `Repo: ${repoFull}\n` +
                    `Branch: ${branch}\n` +
                    `Head SHA: ${headSha}\n\n` +
                    `Tutti i check visibili sono verdi e non risultano review comment AI attivi.\n\n` +
                    `${prUrl}`;

                  await addIssueComment(prNumber, readyText);

                  await sendTelegram(
                    `✅ Pickfair PR #${prNumber}: pronta per micro-audit.\n\n` +
                    `Branch: ${branch}\n` +
                    `Head SHA: ${shortSha(headSha)}\n\n` +
                    `${prUrl}`
                  );
                }

                core.info("No failures and no pending checks.");
                return;
              }

              if (latestCodexNeedsManualUpdate && !hasAnyMarker(comments, MANUAL_MARKER_PREFIX, manualHash)) {
                const manualText =
                  `${MANUAL_MARKER_PREFIX} hash=${manualHash} head=${headSha} at=${nowIso()} -->\n\n` +
                  `⚠️ Codex ha risposto NEEDS_MANUAL_UPDATE_BRANCH.\n\n` +
                  `Serve aprire il task Codex e premere manualmente "Aggiorna ramo".\n\n` +
                  `PR: #${prNumber}\n` +
                  `Branch: ${branch}\n` +
                  `Head SHA attuale: ${headSha}\n\n` +
                  `${prUrl}`;

                await addIssueComment(prNumber, manualText);

                await sendTelegram(
                  `⚠️ Pickfair PR #${prNumber}: Codex chiede Aggiorna ramo.\n\n` +
                  `Codex ha risposto NEEDS_MANUAL_UPDATE_BRANCH.\n` +
                  `Apri il task Codex e premi “Aggiorna ramo”.\n\n` +
                  `Branch: ${branch}\n` +
                  `Head SHA: ${shortSha(headSha)}\n\n` +
                  `${prUrl}`
                );

                core.info("Manual update branch requested by Codex.");
              }

              if (hasRecentMarker(comments, COMMENT_MARKER_PREFIX, stateHash, REMINDER_MINUTES)) {
                core.info(`Same state ${stateHash} already commented recently. Skipping.`);
                return;
              }

              const failedChecksText = failedChecks.length
                ? formatChecks(failedChecks)
                : "Nessun check rosso rilevato.";

              const pendingChecksText = pendingChecks.length
                ? formatChecks(pendingChecks)
                : "Nessun check pending.";

              const annotationsText = formatAnnotations(annotationMap) || "Nessuna annotation GitHub disponibile dai check rossi.";

              const workflowDetailsText = formatWorkflowDetails(workflowDetails) || "Nessun log GitHub Actions dettagliato disponibile.";

              const reviewThreadsText = formatReviewThreads(activeReviewThreads) || "Nessun review thread AI attivo rilevato.";

              let body =
                `${COMMENT_MARKER_PREFIX} hash=${stateHash} head=${headSha} at=${nowIso()} -->\n\n` +
                `@codex\n\n` +
                `PR WORKFLOWS / CHECKS / REVIEW COMMENTS FAILED — FIX REQUIRED\n\n` +
                `Repo: ${repoFull}\n` +
                `PR: #${prNumber}\n` +
                `Branch: ${branch}\n` +
                `Head SHA: ${headSha}\n\n` +
                `Regole:\n` +
                `- Lavora solo sulla PR corrente.\n` +
                `- Non aprire una nuova PR.\n` +
                `- Non fare merge.\n` +
                `- Pusha sulla stessa branch della PR.\n` +
                `- Correggi solo i failure indicati.\n` +
                `- Non cambiare public API o snapshot a meno che il task lo richieda esplicitamente.\n` +
                `- Se un linter chiede di rimuovere parametri pubblici protetti, NON rimuoverli: preserva la signature e gestisci il lint in altro modo.\n` +
                `- Se non puoi aggiornare automaticamente la branch, rispondi esattamente: NEEDS_MANUAL_UPDATE_BRANCH\n\n` +

                `# Check rossi / action_required\n\n` +
                `${failedChecksText}\n\n` +

                `# Check pending\n\n` +
                `${pendingChecksText}\n\n` +

                `# GitHub check annotations\n\n` +
                `${annotationsText}\n\n` +

                `# GitHub Actions failed job logs\n\n` +
                `${workflowDetailsText}\n\n` +

                `# Review comments AI attivi non risolti e non outdated\n\n` +
                `${reviewThreadsText}\n\n` +

                `# Comandi consigliati\n\n` +
                `Esegui almeno i test/check collegati ai failure sopra. Se il log indica un test specifico, esegui quel test prima.\n\n` +

                `# Risposta richiesta\n\n` +
                `Quando hai corretto, rispondi nel commento generale con:\n\n` +
                `DONE / PARTIAL / NOT DONE\n\n` +
                `Summary:\n` +
                `- cosa hai cambiato\n\n` +
                `Commit:\n` +
                `- <commit SHA>\n\n` +
                `New PR head SHA:\n` +
                `- <new PR head SHA>\n\n` +
                `Checks:\n` +
                `- cosa hai eseguito e risultato\n\n` +
                `Review comments handled:\n` +
                `- thread/commento: Fatto in commit <SHA> oppure skipped perché <motivo>\n`;

              body = truncate(body, MAX_TOTAL_COMMENT_CHARS);

              await addIssueComment(prNumber, body);

              await sendTelegram(
                `🟡 Pickfair PR #${prNumber}: azione Codex richiesta.\n\n` +
                `${failedChecks.length ? "⛔ Check/workflow rossi\n" : ""}` +
                `${activeReviewThreads.length ? "🟡 Review comment AI attivi\n" : ""}` +
                `${pendingChecks.length ? "⏳ Check pending\n" : "✅ Nessun pending\n"}` +
                `\nHo commentato automaticamente la PR con @codex includendo log dei job falliti.\n` +
                `Reminder massimo 1 volta ogni ora per stesso commit/stato.\n\n` +
                `${prUrl}`
              );

              core.info(`Posted Codex monitor comment for state ${stateHash}.`);
            }

            await main();