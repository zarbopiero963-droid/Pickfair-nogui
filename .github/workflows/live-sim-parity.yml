name: live-sim-parity

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  live-sim-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest

      - name: Trading engine parity
        run: |
          if [ -f tests/integration/test_trading_engine_live_sim_contract_parity.py ]; then pytest -q tests/integration/test_trading_engine_live_sim_contract_parity.py; else echo "SKIP: test_trading_engine_live_sim_contract_parity.py absent"; fi

      - name: Order manager parity
        run: |
          if [ -f tests/integration/test_order_manager_live_sim_parity.py ]; then pytest -q tests/integration/test_order_manager_live_sim_parity.py; else echo "SKIP: test_order_manager_live_sim_parity.py absent"; fi

      - name: Money management parity
        run: |
          if [ -f tests/integration/test_money_management_live_sim_parity.py ]; then pytest -q tests/integration/test_money_management_live_sim_parity.py; else echo "SKIP: test_money_management_live_sim_parity.py absent"; fi

      - name: Runtime controller parity
        run: |
          if [ -f tests/integration/test_runtime_controller_live_sim_parity.py ]; then pytest -q tests/integration/test_runtime_controller_live_sim_parity.py; else echo "SKIP: test_runtime_controller_live_sim_parity.py absent"; fi

      - name: Simulation broker parity
        run: |
          if [ -f tests/integration/test_simulation_broker_pattern_parity.py ]; then pytest -q tests/integration/test_simulation_broker_pattern_parity.py; else echo "SKIP: test_simulation_broker_pattern_parity.py absent"; fi
          if [ -f tests/integration/test_simulation_broker_copy_parity.py ]; then pytest -q tests/integration/test_simulation_broker_copy_parity.py; else echo "SKIP: test_simulation_broker_copy_parity.py absent"; fi
          if [ -f tests/integration/test_simulation_broker_cashout_parity.py ]; then pytest -q tests/integration/test_simulation_broker_cashout_parity.py; else echo "SKIP: test_simulation_broker_cashout_parity.py absent"; fi
          pytest -q tests/integration/test_simulation_broker_dutching_parity.py
