name: readiness-gate

on:
  pull_request:
    paths:
      - "ops/readiness_checklist.md"
      - "ops/db_backup_restore.md"
      - "scripts/readiness_gate.py"
      - "scripts/db_restore_validate.py"
      - "tests/scripts/test_readiness_gate.py"
      - ".github/workflows/readiness-gate.yml"
  push:
    paths:
      - "ops/readiness_checklist.md"
      - "ops/db_backup_restore.md"
      - "scripts/readiness_gate.py"
      - "scripts/db_restore_validate.py"
      - "tests/scripts/test_readiness_gate.py"
      - ".github/workflows/readiness-gate.yml"

jobs:
  readiness-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run readiness gate tests
        run: |
          pytest -q tests/scripts/test_readiness_gate.py -x
