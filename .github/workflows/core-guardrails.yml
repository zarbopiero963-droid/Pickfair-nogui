name: Core Guardrails

on:
  push:
  pull_request:

jobs:
  test-core-components:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run core guardrail tests
        run: |
          pytest -q tests/test_event_bus.py tests/test_duplication_guard.py tests/test_async_db_writer.py
