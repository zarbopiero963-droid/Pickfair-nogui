name: runtime-controller

on:
  push:
    paths:
      - "core/runtime_controller.py"
      - "guardrails/specs/core.runtime_controller.json"
      - "guardrails/contracts/core.runtime_controller.json"
      - "guardrails/state_models/core.runtime_controller.json"
      - "guardrails/mutations/core.runtime_controller.json"
      - "tests/integration/test_runtime_controller_copy_flow.py"
      - "tests/integration/test_runtime_controller_pattern_flow.py"
      - "tests/integration/test_runtime_controller_live_sim_parity.py"
  pull_request:
    paths:
      - "core/runtime_controller.py"
      - "guardrails/specs/core.runtime_controller.json"
      - "guardrails/contracts/core.runtime_controller.json"
      - "guardrails/state_models/core.runtime_controller.json"
      - "guardrails/mutations/core.runtime_controller.json"
      - "tests/integration/test_runtime_controller_copy_flow.py"
      - "tests/integration/test_runtime_controller_pattern_flow.py"
      - "tests/integration/test_runtime_controller_live_sim_parity.py"

jobs:
  run:
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "core/runtime_controller.py"
      spec_path: "guardrails/specs/core.runtime_controller.json"
      contract_path: "guardrails/contracts/core.runtime_controller.json"
      state_model_path: "guardrails/state_models/core.runtime_controller.json"
      mutation_path: "guardrails/mutations/core.runtime_controller.json"
      test_paths: "tests/integration/test_runtime_controller_copy_flow.py tests/integration/test_runtime_controller_pattern_flow.py tests/integration/test_runtime_controller_live_sim_parity.py"