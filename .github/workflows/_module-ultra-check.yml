name: _module-ultra-check

on:
  workflow_call:
    inputs:
      module_path:
        required: true
        type: string
      spec_path:
        required: false
        type: string
        default: ""
      contract_path:
        required: false
        type: string
        default: ""
      state_model_path:
        required: false
        type: string
        default: ""
      mutation_path:
        required: false
        type: string
        default: ""
      test_paths:
        required: false
        type: string
        default: ""

jobs:
  ultra-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # PYTHON SETUP
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================================================
      # INSTALL DEPENDENCIES
      # =========================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          pip install pytest pytest-xdist

      # =========================================================
      # MODULE EXISTENCE (HARD FAIL)
      # =========================================================
      - name: Validate target module exists
        shell: bash
        env:
          MODULE_PATH: ${{ inputs.module_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$MODULE_PATH" ]; then
            echo "❌ Module not found: $MODULE_PATH"
            exit 1
          fi

      # =========================================================
      # GUARDRAIL FILES EXISTENCE (HARD FAIL IF PROVIDED)
      # =========================================================
      - name: Validate guardrail files exist when provided
        shell: bash
        env:
          SPEC_PATH: ${{ inputs.spec_path }}
          CONTRACT_PATH: ${{ inputs.contract_path }}
          STATE_MODEL_PATH: ${{ inputs.state_model_path }}
          MUTATION_PATH: ${{ inputs.mutation_path }}
        run: |
          set -euo pipefail
          if [ -n "$SPEC_PATH" ]; then
            test -f "$SPEC_PATH" || (echo "Missing spec file" && exit 1)
          fi

          if [ -n "$CONTRACT_PATH" ]; then
            test -f "$CONTRACT_PATH" || (echo "Missing contract file" && exit 1)
          fi

          if [ -n "$STATE_MODEL_PATH" ]; then
            test -f "$STATE_MODEL_PATH" || (echo "Missing state model file" && exit 1)
          fi

          if [ -n "$MUTATION_PATH" ]; then
            test -f "$MUTATION_PATH" || (echo "Missing mutation file" && exit 1)
          fi

      # =========================================================
      # GUARDRAIL JSON VALIDATION (HARD FAIL)
      # =========================================================
      - name: Validate guardrail JSON syntax
        run: |
          python - <<'PY'
          import json
          import os

          paths = [
              os.environ.get("SPEC_PATH", ""),
              os.environ.get("CONTRACT_PATH", ""),
              os.environ.get("STATE_MODEL_PATH", ""),
              os.environ.get("MUTATION_PATH", ""),
          ]

          for path in paths:
              if path:
                  with open(path, "r", encoding="utf-8") as f:
                      json.load(f)
                  print(f"OK JSON: {path}")
          PY
        env:
          SPEC_PATH: ${{ inputs.spec_path }}
          CONTRACT_PATH: ${{ inputs.contract_path }}
          STATE_MODEL_PATH: ${{ inputs.state_model_path }}
          MUTATION_PATH: ${{ inputs.mutation_path }}

      # =========================================================
      # GUARDRAIL RUNNER VALIDATION-ONLY (HARD FAIL)
      # =========================================================
      - name: Run guardrail runner (validation-only)
        shell: bash
        env:
          MODULE_PATH: ${{ inputs.module_path }}
        run: |
          set -euo pipefail
          module_path="$MODULE_PATH"
          if [[ ! "$module_path" =~ ^[A-Za-z0-9_./-]+\.py$ ]] \
            || [[ "$module_path" == /* ]] \
            || [[ "$module_path" =~ (^|/)\.\.(/|$) ]]; then
            echo "Invalid module path: $module_path"
            exit 1
          fi
          module_name="${module_path%.py}"
          module_name="${module_name//\//.}"

          python scripts/guardrail_runner.py --module "$module_name"

      # =========================================================
      # DETECT EXISTING TEST FILES
      # =========================================================
      - name: Detect existing focused tests
        id: tests_check
        shell: bash
        env:
          TEST_PATHS: ${{ inputs.test_paths }}
        run: |
          set -euo pipefail
          EXISTING_TESTS=""
          set -f
          for path in $TEST_PATHS; do
            if [[ ! "$path" =~ ^[A-Za-z0-9_./-]+$ ]] \
              || [[ "$path" == /* ]] \
              || [[ "$path" =~ (^|/)\.\.(/|$) ]] \
              || [[ "$path" =~ (^|/)- ]]; then
              echo "⚠️ Skipping invalid test path -> $path"
              continue
            fi
            if [ -f "$path" ]; then
              EXISTING_TESTS="$EXISTING_TESTS $path"
            else
              echo "⚠️ Missing focused test -> $path"
            fi
          done
          set +f

          EXISTING_TESTS="$(echo "$EXISTING_TESTS" | xargs)"

          if [ -n "$EXISTING_TESTS" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "existing_tests=$EXISTING_TESTS" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "existing_tests=" >> "$GITHUB_OUTPUT"
          fi

      # =========================================================
      # RUN MODULE TESTS (ONLY IF EXIST)
      # =========================================================
      - name: Run module-focused tests
        if: ${{ steps.tests_check.outputs.has_tests == 'true' }}
        shell: bash
        env:
          EXISTING_TESTS: ${{ steps.tests_check.outputs.existing_tests }}
        run: |
          set -euo pipefail
          echo "Running focused tests:"
          echo "$EXISTING_TESTS"

          pytest -q -x -- $EXISTING_TESTS

      # =========================================================
      # WARNING IF NO TESTS
      # =========================================================
      - name: Advisory if module exists but no focused tests
        if: ${{ steps.tests_check.outputs.has_tests != 'true' }}
        shell: bash
        env:
          MODULE_PATH: ${{ inputs.module_path }}
        run: |
          set -euo pipefail
          echo "::warning::No focused tests found for module $MODULE_PATH"

      # =========================================================
      # FULL SUITE BACKSTOP (SEMPRE)
      # =========================================================
      - name: Run full test suite (backstop)
        run: |
          pytest -q

      # =========================================================
      # UPLOAD DEBUG ARTIFACT
      # =========================================================
      - name: Upload pytest cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultra-check-cache
          path: .pytest_cache
