name: _module-ultra-check

on:
  workflow_call:
    inputs:
      module_path:
        required: true
        type: string
      spec_path:
        required: false
        type: string
        default: ""
      contract_path:
        required: false
        type: string
        default: ""
      state_model_path:
        required: false
        type: string
        default: ""
      mutation_path:
        required: false
        type: string
        default: ""
      test_paths:
        required: false
        type: string
        default: ""

jobs:
  ultra-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # PYTHON SETUP
      # =========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================================================
      # INSTALL DEPENDENCIES
      # =========================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          pip install pytest pytest-xdist

      # =========================================================
      # MODULE EXISTENCE (HARD FAIL)
      # =========================================================
      - name: Validate target module exists
        run: |
          if [ ! -f "${{ inputs.module_path }}" ]; then
            echo "❌ Module not found: ${{ inputs.module_path }}"
            exit 1
          fi

      # =========================================================
      # GUARDRAIL FILES EXISTENCE (HARD FAIL IF PROVIDED)
      # =========================================================
      - name: Validate guardrail files exist when provided
        run: |
          if [ -n "${{ inputs.spec_path }}" ]; then
            test -f "${{ inputs.spec_path }}" || (echo "Missing spec file" && exit 1)
          fi

          if [ -n "${{ inputs.contract_path }}" ]; then
            test -f "${{ inputs.contract_path }}" || (echo "Missing contract file" && exit 1)
          fi

          if [ -n "${{ inputs.state_model_path }}" ]; then
            test -f "${{ inputs.state_model_path }}" || (echo "Missing state model file" && exit 1)
          fi

          if [ -n "${{ inputs.mutation_path }}" ]; then
            test -f "${{ inputs.mutation_path }}" || (echo "Missing mutation file" && exit 1)
          fi

      # =========================================================
      # GUARDRAIL JSON VALIDATION (HARD FAIL)
      # =========================================================
      - name: Validate guardrail JSON syntax
        run: |
          python - <<'PY'
          import json
          import os

          paths = [
              os.environ.get("SPEC_PATH", ""),
              os.environ.get("CONTRACT_PATH", ""),
              os.environ.get("STATE_MODEL_PATH", ""),
              os.environ.get("MUTATION_PATH", ""),
          ]

          for path in paths:
              if path:
                  with open(path, "r", encoding="utf-8") as f:
                      json.load(f)
                  print(f"OK JSON: {path}")
          PY
        env:
          SPEC_PATH: ${{ inputs.spec_path }}
          CONTRACT_PATH: ${{ inputs.contract_path }}
          STATE_MODEL_PATH: ${{ inputs.state_model_path }}
          MUTATION_PATH: ${{ inputs.mutation_path }}

      # =========================================================
      # GUARDRIAL RUNNER VALIDATION-ONLY (HARD FAIL)
      # =========================================================
      - name: Run guardrail runner (validation-only)
        shell: bash
        run: |
          set -euo pipefail
          module_path="${{ inputs.module_path }}"
          module_name="${module_path%.py}"
          module_name="${module_name//\//.}"

          python scripts/guardrail_runner.py --module "$module_name"

      # =========================================================
      # DETECT EXISTING TEST FILES
      # =========================================================
      - name: Detect existing focused tests
        id: tests_check
        shell: bash
        run: |
          EXISTING_TESTS=""

          for path in ${{ inputs.test_paths }}; do
            if [ -f "$path" ]; then
              EXISTING_TESTS="$EXISTING_TESTS $path"
            else
              echo "⚠️ Missing focused test -> $path"
            fi
          done

          EXISTING_TESTS="$(echo "$EXISTING_TESTS" | xargs)"

          if [ -n "$EXISTING_TESTS" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "existing_tests=$EXISTING_TESTS" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "existing_tests=" >> "$GITHUB_OUTPUT"
          fi

      # =========================================================
      # RUN MODULE TESTS (ONLY IF EXIST)
      # =========================================================
      - name: Run module-focused tests
        if: ${{ steps.tests_check.outputs.has_tests == 'true' }}
        run: |
          echo "Running focused tests:"
          echo "${{ steps.tests_check.outputs.existing_tests }}"

          pytest -q -x ${{ steps.tests_check.outputs.existing_tests }}

      # =========================================================
      # WARNING IF NO TESTS
      # =========================================================
      - name: Advisory if module exists but no focused tests
        if: ${{ steps.tests_check.outputs.has_tests != 'true' }}
        run: |
          echo "::warning::No focused tests found for module ${{ inputs.module_path }}"

      # =========================================================
      # FULL SUITE BACKSTOP (SEMPRE)
      # =========================================================
      - name: Run full test suite (backstop)
        run: |
          pytest -q

      # =========================================================
      # UPLOAD DEBUG ARTIFACT
      # =========================================================
      - name: Upload pytest cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultra-check-cache
          path: .pytest_cache
