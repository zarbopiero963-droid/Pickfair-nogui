name: live-gate

on:
  push:
    paths:
      - "live_gate.py"
      - "guardrails/specs/live_gate.json"
      - "guardrails/contracts/live_gate.json"
      - "guardrails/state_models/live_gate.json"
      - "guardrails/mutations/live_gate.json"
      - "tests/**/test_*live*gate*.py"
  pull_request:
    paths:
      - "live_gate.py"
      - "guardrails/specs/live_gate.json"
      - "guardrails/contracts/live_gate.json"
      - "guardrails/state_models/live_gate.json"
      - "guardrails/mutations/live_gate.json"
      - "tests/**/test_*live*gate*.py"

jobs:
  run:
    uses: ./.github/workflows/_module-ultra-check.yml
    with:
      module_path: "live_gate.py"
      spec_path: "guardrails/specs/live_gate.json"
      contract_path: "guardrails/contracts/live_gate.json"
      state_model_path: "guardrails/state_models/live_gate.json"
      mutation_path: "guardrails/mutations/live_gate.json"
      test_paths: "tests"