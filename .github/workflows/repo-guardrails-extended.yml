name: repo-guardrails-extended

on:
  push:
    paths:
      - "guardrails/**"
      - ".github/workflows/**"
      - "scripts/run_mutation_guardrails.py"
      - "scripts/generate_missing_guardrail_tests.py"
  pull_request:
    paths:
      - "guardrails/**"
      - ".github/workflows/**"
      - "scripts/run_mutation_guardrails.py"
      - "scripts/generate_missing_guardrail_tests.py"
  workflow_dispatch:

jobs:
  validate-all-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate all guardrail JSON
        run: |
          python - <<'PY'
          import json
          import pathlib
          root = pathlib.Path("guardrails")
          if not root.exists():
              raise SystemExit("guardrails directory missing")
          count = 0
          for path in root.rglob("*.json"):
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
              print(f"OK {path}")
              count += 1
          print(f"Validated guardrail JSON files: {count}")
          PY

      - name: Validate workflow YAML presence
        run: |
          test -d .github/workflows
          ls -la .github/workflows