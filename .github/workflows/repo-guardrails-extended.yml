name: repo-guardrails-extended

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  validate-all-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate all guardrail JSON
        run: |
          python scripts/validate_guardrails.py

      - name: Check merge markers
        run: |
          python scripts/check_merge_markers.py