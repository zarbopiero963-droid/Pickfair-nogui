name: PR Overlap Guard (Smart Critical Mode)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  overlap-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch open PRs
        id: fetch_prs
        run: |
          REPO="${{ github.repository }}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls?state=open&per_page=100" \
            > open_prs.json

      - name: Fetch current PR files
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            > current_pr_files.json

      - name: Run smart overlap check
        run: |
          python - <<'PY'
          import json
          import sys

          CRITICAL_FILES = {
              "core/trading_engine.py",
              "order_manager.py",
              "core/reconciliation_engine.py",
              "core/state_recovery.py",
              "database.py",
          }

          with open("open_prs.json", "r", encoding="utf-8") as f:
              open_prs = json.load(f)

          with open("current_pr_files.json", "r", encoding="utf-8") as f:
              current_files = {x["filename"] for x in json.load(f)}

          current_pr_number = int("${{ github.event.pull_request.number }}")

          overlapping = []
          critical_overlap = []

          import urllib.request

          for pr in open_prs:
              pr_number = pr["number"]

              if pr_number == current_pr_number:
                  continue

              url = pr["url"] + "/files"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": "Bearer ${{ secrets.GITHUB_TOKEN }}",
                      "Accept": "application/vnd.github+json"
                  }
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      pr_files = {x["filename"] for x in json.load(resp)}
              except Exception:
                  continue

              overlap = current_files & pr_files
              if overlap:
                  overlapping.append((pr_number, overlap))

                  for f in overlap:
                      if f in CRITICAL_FILES:
                          critical_overlap.append((pr_number, f))

          print("=" * 80)
          print("PR OVERLAP REPORT")
          print("=" * 80)

          if not overlapping:
              print("No overlapping files with other PRs")
              sys.exit(0)

          print("Overlapping files detected:")

          for pr_number, files in overlapping:
              print(f"\nPR #{pr_number}")
              for f in files:
                  print(f" - {f}")

          print()

          if critical_overlap:
              print("❌ CRITICAL OVERLAP DETECTED:")
              for pr_number, f in critical_overlap:
                  print(f" - PR #{pr_number} touches critical file: {f}")
              sys.exit(1)

          print("⚠️ Non-critical overlap detected (allowed, but be careful)")
          sys.exit(0)
          PY

      - name: Upload overlap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-overlap-report
          path: |
            open_prs.json
            current_pr_files.json