name: PR Telegram Notify

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to inspect"
        required: true
        type: string

  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

  check_run:
    types: [completed]

  status:

  issue_comment:
    types: [created]

  pull_request_review:
    types: [submitted]

  pull_request_review_comment:
    types: [created]

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read
  statuses: read
  actions: read

concurrency:
  group: pr-telegram-notify-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.sha }}
  cancel-in-progress: true

jobs:
  notify:
    name: Send PR failure/comment report to Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Collect PR status, annotations and comments
        id: collect
        uses: actions/github-script@v7
        env:
          TELEGRAM_MAX_CHUNKS: "3"
        with:
          github-token: ${{ secrets.PICKFAIR_ACTIONS_TOKEN }}
          script: |
            const fs = require("fs");
            const crypto = require("crypto");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFull = `${owner}/${repo}`;

            const WAIT_UNTIL_CHECKS_SETTLED = true;

            const MAX_FAILED_RUNS = 8;
            const MAX_FAILED_JOBS_PER_RUN = 4;
            const MAX_LOG_CHARS_PER_JOB = 3200;
            const MAX_COMMENT_CHARS = 1200;
            const MAX_ANNOTATIONS_PER_CHECK = 30;
            const MAX_ANNOTATION_CHARS = 700;

            function sha256(text) {
              return crypto.createHash("sha256").update(text).digest("hex");
            }

            function shortSha(sha) {
              return sha ? sha.slice(0, 12) : "n/a";
            }

            function truncate(text, max) {
              text = String(text || "");
              if (text.length <= max) return text;
              return text.slice(0, max) + "\n...[truncated]...";
            }

            function clean(text) {
              return String(text || "")
                .replace(/\r/g, "")
                .replace(/[ \t]+$/gm, "")
                .trim();
            }

            function isBotNoise(login, body) {
              const user = String(login || "").toLowerCase();
              const text = String(body || "").toLowerCase();

              if (user === "github-actions[bot]") return true;
              if (text.includes("pickfair-codex-monitor")) return true;
              if (text.includes("rilevato dal monitor automatico")) return true;
              if (text.includes("ho commentato automaticamente la pr con @codex")) return true;

              return false;
            }

            async function inferPrNumber() {
              if (context.payload.pull_request?.number) {
                return context.payload.pull_request.number;
              }

              if (context.payload.inputs?.pr_number) {
                return Number(context.payload.inputs.pr_number);
              }

              if (context.payload.issue?.pull_request && context.payload.issue?.number) {
                return context.payload.issue.number;
              }

              if (context.payload.comment?.pull_request_url) {
                const url = context.payload.comment.pull_request_url;
                const m = url.match(/\/pulls\/(\d+)$/);
                if (m) return Number(m[1]);
              }

              if (context.payload.review?.pull_request_url) {
                const url = context.payload.review.pull_request_url;
                const m = url.match(/\/pulls\/(\d+)$/);
                if (m) return Number(m[1]);
              }

              if (context.payload.check_run?.pull_requests?.length) {
                return context.payload.check_run.pull_requests[0].number;
              }

              if (context.eventName === "status" && context.payload.sha) {
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: "open",
                  per_page: 100,
                });

                const match = prs.find(pr => pr.head.sha === context.payload.sha);
                if (match) return match.number;

                if (prs.length === 1) return prs[0].number;
              }

              const openPrs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });

              if (openPrs.length === 1) return openPrs[0].number;

              return null;
            }

            async function getPr(prNumber) {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              return data;
            }

            async function getHeadCommitDate(headSha) {
              const { data } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: headSha,
              });

              return new Date(
                data.commit?.committer?.date ||
                data.commit?.author?.date ||
                data.committer?.date ||
                data.author?.date ||
                new Date().toISOString()
              );
            }

            async function getStatuses(headSha) {
              try {
                const { data } = await github.rest.repos.getCombinedStatusForRef({
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                });

                return (data.statuses || []).map(s => ({
                  kind: "status",
                  id: null,
                  name: s.context,
                  state: s.state,
                  status: s.state,
                  conclusion: s.state,
                  url: s.target_url || "",
                  description: s.description || "",
                  summary: "",
                }));
              } catch (err) {
                core.warning(`Could not read combined statuses: ${err.message}`);
                return [];
              }
            }

            async function getCheckRuns(headSha) {
              try {
                const runs = await github.paginate(github.rest.checks.listForRef, {
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                });

                return runs.map(r => ({
                  kind: "check_run",
                  id: r.id,
                  name: r.name,
                  status: r.status,
                  conclusion: r.conclusion,
                  url: r.html_url || r.details_url || "",
                  details_url: r.details_url || "",
                  description: "",
                  summary: clean(r.output?.summary || r.output?.text || ""),
                }));
              } catch (err) {
                core.warning(`Could not read check runs: ${err.message}`);
                return [];
              }
            }

            async function getCheckAnnotations(checkRunId) {
              try {
                const annotations = await github.paginate(github.rest.checks.listAnnotations, {
                  owner,
                  repo,
                  check_run_id: checkRunId,
                  per_page: 100,
                });

                return annotations.slice(0, MAX_ANNOTATIONS_PER_CHECK).map(a => ({
                  path: a.path,
                  start_line: a.start_line,
                  end_line: a.end_line,
                  annotation_level: a.annotation_level,
                  message: clean(a.message || ""),
                  title: clean(a.title || ""),
                  raw_details: clean(a.raw_details || ""),
                }));
              } catch (err) {
                core.warning(`Could not read annotations for check ${checkRunId}: ${err.message}`);
                return [];
              }
            }

            function isFailedCheck(c) {
              if (c.kind === "status") {
                return ["failure", "error"].includes(c.state);
              }

              if (c.status !== "completed") return false;

              return ["failure", "timed_out", "cancelled", "action_required"].includes(c.conclusion || "");
            }

            function isPendingCheck(c) {
              if (c.kind === "status") {
                return c.state === "pending";
              }

              return c.status && c.status !== "completed";
            }

            async function getWorkflowRuns(headSha) {
              try {
                const { data } = await github.request(
                  "GET /repos/{owner}/{repo}/actions/runs",
                  {
                    owner,
                    repo,
                    head_sha: headSha,
                    per_page: 50,
                  }
                );

                return data.workflow_runs || [];
              } catch (err) {
                core.warning(`Could not read workflow runs: ${err.message}`);
                return [];
              }
            }

            async function getWorkflowJobs(runId) {
              try {
                return await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                  owner,
                  repo,
                  run_id: runId,
                  per_page: 100,
                });
              } catch (err) {
                core.warning(`Could not read jobs for run ${runId}: ${err.message}`);
                return [];
              }
            }

            async function getJobLog(jobId) {
              try {
                const response = await github.request(
                  "GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs",
                  {
                    owner,
                    repo,
                    job_id: jobId,
                  }
                );

                if (typeof response.data === "string") return response.data;
                if (Buffer.isBuffer(response.data)) return response.data.toString("utf8");
                if (response.data instanceof ArrayBuffer) return Buffer.from(response.data).toString("utf8");

                return String(response.data || "");
              } catch (err) {
                core.warning(`Could not download log for job ${jobId}: ${err.message}`);
                return "";
              }
            }

            function extractFailureSnippet(log) {
              const text = String(log || "").replace(/\r/g, "");
              const lines = text.split("\n");

              const patterns = [
                /FAILURES/i,
                /FAILED /i,
                /AssertionError/i,
                /Traceback/i,
                /Error:/i,
                /ERROR/i,
                /Process completed with exit code/i,
                /Signature cambiata/i,
                /expected=.*actual=/i,
                /Codacy/i,
                /DeepSource/i,
              ];

              const hits = [];

              for (let i = 0; i < lines.length; i++) {
                if (patterns.some(p => p.test(lines[i]))) {
                  hits.push(i);
                }
              }

              if (!hits.length) {
                return truncate(lines.slice(-80).join("\n"), MAX_LOG_CHARS_PER_JOB);
              }

              const out = [];

              for (const idx of hits.slice(0, 4)) {
                const start = Math.max(0, idx - 12);
                const end = Math.min(lines.length, idx + 35);
                out.push(`--- log lines ${start + 1}-${end} ---`);
                out.push(lines.slice(start, end).join("\n"));
              }

              return truncate(out.join("\n"), MAX_LOG_CHARS_PER_JOB);
            }

            async function getFailedWorkflowDetails(headSha) {
              const runs = await getWorkflowRuns(headSha);

              const failedRuns = runs
                .filter(r => ["failure", "timed_out", "cancelled", "action_required"].includes(r.conclusion || ""))
                .slice(0, MAX_FAILED_RUNS);

              const details = [];

              for (const run of failedRuns) {
                const jobs = await getWorkflowJobs(run.id);

                const failedJobs = jobs
                  .filter(j => ["failure", "timed_out", "cancelled", "action_required"].includes(j.conclusion || ""))
                  .slice(0, MAX_FAILED_JOBS_PER_RUN);

                const jobDetails = [];

                for (const job of failedJobs) {
                  const log = await getJobLog(job.id);
                  const snippet = extractFailureSnippet(log);

                  const failedSteps = (job.steps || [])
                    .filter(s => ["failure", "timed_out", "cancelled", "action_required"].includes(s.conclusion || ""))
                    .map(s => `#${s.number} ${s.name}: ${s.conclusion}`);

                  jobDetails.push({
                    name: job.name,
                    conclusion: job.conclusion,
                    url: job.html_url,
                    failedSteps,
                    snippet,
                  });
                }

                details.push({
                  name: run.name,
                  conclusion: run.conclusion,
                  url: run.html_url,
                  jobs: jobDetails,
                });
              }

              return details;
            }

            async function getNewCommentsAfter(prNumber, sinceDate) {
              const sinceMs = sinceDate.getTime();

              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });

              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });

              const out = [];

              for (const c of issueComments) {
                const created = new Date(c.created_at).getTime();
                if (created <= sinceMs) continue;
                if (isBotNoise(c.user?.login, c.body)) continue;

                out.push({
                  type: "conversation",
                  id: c.id,
                  author: c.user?.login || "unknown",
                  created_at: c.created_at,
                  url: c.html_url,
                  body: truncate(clean(c.body), MAX_COMMENT_CHARS),
                });
              }

              for (const c of reviewComments) {
                const created = new Date(c.created_at).getTime();
                if (created <= sinceMs) continue;
                if (isBotNoise(c.user?.login, c.body)) continue;

                out.push({
                  type: "review_comment",
                  id: c.id,
                  author: c.user?.login || "unknown",
                  created_at: c.created_at,
                  url: c.html_url,
                  path: c.path,
                  line: c.line || c.original_line,
                  body: truncate(clean(c.body), MAX_COMMENT_CHARS),
                });
              }

              for (const r of reviews) {
                const submittedAt = r.submitted_at || r.submittedAt;
                const submitted = new Date(submittedAt || 0).getTime();
                const body = clean(r.body || "");

                if (!submitted || submitted <= sinceMs) continue;
                if (!body) continue;
                if (isBotNoise(r.user?.login, body)) continue;

                out.push({
                  type: "review",
                  id: r.id,
                  author: r.user?.login || "unknown",
                  created_at: submittedAt,
                  url: r.html_url || "",
                  state: r.state,
                  body: truncate(body, MAX_COMMENT_CHARS),
                });
              }

              out.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

              return out.slice(0, 40);
            }

            function formatFailedChecks(failedChecks) {
              if (!failedChecks.length) return "Nessun check rosso.";

              return failedChecks.map(c => {
                const state = c.kind === "status"
                  ? c.state
                  : `${c.status || ""}/${c.conclusion || ""}`;

                return [
                  `- ${c.name}: ${state}`,
                  c.description ? `  ${c.description}` : "",
                  c.summary ? `  Summary: ${truncate(c.summary, 500)}` : "",
                  c.url ? `  ${c.url}` : "",
                ].filter(Boolean).join("\n");
              }).join("\n");
            }

            function formatPendingChecks(pendingChecks) {
              if (!pendingChecks.length) return "Nessun pending.";

              return pendingChecks.map(c => {
                const state = c.kind === "status"
                  ? c.state
                  : `${c.status || ""}/${c.conclusion || ""}`;

                return `- ${c.name}: ${state}`;
              }).join("\n");
            }

            function formatAnnotations(annotationMap) {
              const chunks = [];

              for (const [checkName, annotations] of Object.entries(annotationMap)) {
                if (!annotations.length) continue;

                chunks.push(`CHECK ANNOTATIONS: ${checkName}`);

                for (const a of annotations.slice(0, MAX_ANNOTATIONS_PER_CHECK)) {
                  chunks.push(
                    [
                      `- ${a.annotation_level || "annotation"} ${a.path || ""}:${a.start_line || "n/a"}`,
                      a.title ? `  Title: ${truncate(a.title, MAX_ANNOTATION_CHARS)}` : "",
                      a.message ? `  Message: ${truncate(a.message, MAX_ANNOTATION_CHARS)}` : "",
                      a.raw_details ? `  Details: ${truncate(a.raw_details, MAX_ANNOTATION_CHARS)}` : "",
                    ].filter(Boolean).join("\n")
                  );
                }

                chunks.push("");
              }

              return chunks.length ? chunks.join("\n") : "Nessuna check annotation disponibile.";
            }

            function formatWorkflowDetails(details) {
              if (!details.length) return "Nessun workflow failure dettagliato trovato.";

              const chunks = [];

              for (const run of details) {
                chunks.push(`WORKFLOW: ${run.name}`);
                chunks.push(`Status: ${run.conclusion}`);
                chunks.push(`Run: ${run.url}`);

                for (const job of run.jobs || []) {
                  chunks.push(`JOB: ${job.name} (${job.conclusion})`);
                  if (job.url) chunks.push(`Job URL: ${job.url}`);

                  if (job.failedSteps?.length) {
                    chunks.push("Failed steps:");
                    for (const step of job.failedSteps) {
                      chunks.push(`- ${step}`);
                    }
                  }

                  if (job.snippet) {
                    chunks.push("Log utile:");
                    chunks.push(job.snippet);
                  }
                }

                chunks.push("");
              }

              return chunks.join("\n");
            }

            function formatNewComments(comments) {
              if (!comments.length) return "Nessun nuovo commento dopo l'ultimo commit.";

              return comments.map(c => {
                const loc = c.path ? `${c.path}:${c.line || "n/a"}` : "";
                return [
                  `- ${c.type} by ${c.author}${loc ? ` on ${loc}` : ""}`,
                  c.state ? `  state: ${c.state}` : "",
                  c.url ? `  ${c.url}` : "",
                  c.body ? `  ${c.body.replace(/\n/g, "\n  ")}` : "",
                ].filter(Boolean).join("\n");
              }).join("\n\n");
            }

            async function main() {
              const prNumber = await inferPrNumber();

              if (!prNumber) {
                core.info("No PR number found.");
                core.setOutput("should_notify", "false");
                return;
              }

              const pr = await getPr(prNumber);

              if (pr.state !== "open") {
                core.info(`PR #${prNumber} is not open.`);
                core.setOutput("should_notify", "false");
                return;
              }

              const headSha = pr.head.sha;
              const branch = pr.head.ref;
              const commitDate = await getHeadCommitDate(headSha);

              const checks = [
                ...(await getStatuses(headSha)),
                ...(await getCheckRuns(headSha)),
              ];

              const failedChecks = checks.filter(isFailedCheck);
              const pendingChecks = checks.filter(isPendingCheck);

              const annotationMap = {};

              for (const c of failedChecks) {
                if (c.kind === "check_run" && c.id) {
                  const annotations = await getCheckAnnotations(c.id);
                  if (annotations.length) {
                    annotationMap[c.name] = annotations;
                  }
                }
              }

              const newComments = await getNewCommentsAfter(prNumber, commitDate);

              if (WAIT_UNTIL_CHECKS_SETTLED && pendingChecks.length > 0) {
                core.info(`Checks still pending (${pendingChecks.length}); waiting before Telegram report.`);
                core.setOutput("should_notify", "false");
                return;
              }

              const shouldNotify = failedChecks.length > 0 || newComments.length > 0;

              if (!shouldNotify) {
                core.info("No failed checks and no new comments after commit.");
                core.setOutput("should_notify", "false");
                return;
              }

              const workflowDetails = await getFailedWorkflowDetails(headSha);

              const statePayload = {
                pr: prNumber,
                headSha,
                failedChecks: failedChecks.map(c => `${c.name}:${c.kind}:${c.status || c.state}:${c.conclusion || ""}:${c.url || ""}`),
                annotations: Object.entries(annotationMap).map(([name, annotations]) => `${name}:${annotations.length}`),
                newComments: newComments.map(c => `${c.type}:${c.id}:${c.created_at}`),
              };

              const stateHash = sha256(JSON.stringify(statePayload)).slice(0, 20);

              const report = [
                `🟡 Pickfair PR #${prNumber}: report dopo commit`,
                "",
                `Repo: ${repoFull}`,
                `Branch: ${branch}`,
                `Head SHA: ${headSha}`,
                `Short SHA: ${shortSha(headSha)}`,
                `Commit date: ${commitDate.toISOString()}`,
                `PR: ${pr.html_url}`,
                "",
                `Check rossi: ${failedChecks.length}`,
                `Check pending: ${pendingChecks.length}`,
                `Check con annotations: ${Object.keys(annotationMap).length}`,
                `Nuovi commenti dopo commit: ${newComments.length}`,
                "",
                "==============================",
                "CHECK ROSSI",
                "==============================",
                formatFailedChecks(failedChecks),
                "",
                "==============================",
                "CHECK ANNOTATIONS",
                "==============================",
                formatAnnotations(annotationMap),
                "",
                "==============================",
                "WORKFLOW/JOB LOG UTILI",
                "==============================",
                formatWorkflowDetails(workflowDetails),
                "",
                "==============================",
                "NUOVI COMMENTI DOPO COMMIT",
                "==============================",
                formatNewComments(newComments),
              ].join("\n");

              fs.writeFileSync("telegram-report.txt", report);
              fs.mkdirSync(".telegram-notify-state", { recursive: true });

              core.setOutput("should_notify", "true");
              core.setOutput("state_hash", stateHash);
              core.setOutput("pr_number", String(prNumber));

              core.info(`Prepared Telegram report for PR #${prNumber}, state ${stateHash}.`);
            }

            await main();

      - name: Prepare cache directory
        if: steps.collect.outputs.should_notify == 'true'
        run: mkdir -p .telegram-notify-state

      - name: Deduplicate Telegram report
        if: steps.collect.outputs.should_notify == 'true'
        id: telegram_cache
        uses: actions/cache@v4
        with:
          path: .telegram-notify-state
          key: pr-telegram-notify-${{ steps.collect.outputs.state_hash }}

      - name: Send Telegram report
        if: steps.collect.outputs.should_notify == 'true' && steps.telegram_cache.outputs.cache-hit != 'true'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_HASH: ${{ steps.collect.outputs.state_hash }}
        with:
          script: |
            const fs = require("fs");

            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (!token || !chatId) {
              core.setFailed("Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID.");
              return;
            }

            const report = fs.readFileSync("telegram-report.txt", "utf8");

            function splitIntoChunks(text, maxLen) {
              const chunks = [];
              let rest = text;

              while (rest.length > maxLen) {
                let cut = rest.lastIndexOf("\n", maxLen);
                if (cut < 1000) cut = maxLen;
                chunks.push(rest.slice(0, cut));
                rest = rest.slice(cut).trimStart();
              }

              if (rest.length) chunks.push(rest);
              return chunks;
            }

            let chunks = splitIntoChunks(report, 3400);

            if (chunks.length > 3) {
              chunks = chunks.slice(0, 3);
              chunks[2] = chunks[2].slice(0, 3100) + "\n\n...[TRONCATO: report troppo lungo]...";
            }

            for (let i = 0; i < chunks.length; i++) {
              const prefix = chunks.length > 1 ? `(${i + 1}/${chunks.length})\n` : "";
              const text = prefix + chunks[i];

              const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                body: new URLSearchParams({
                  chat_id: chatId,
                  text,
                  disable_web_page_preview: "false",
                }),
              });

              if (!response.ok) {
                core.setFailed(`Telegram failed: ${response.status} ${await response.text()}`);
                return;
              }
            }

            fs.writeFileSync(
              ".telegram-notify-state/sent.txt",
              `sent=${new Date().toISOString()}\nhash=${process.env.STATE_HASH}\n`
            );

      - name: Skip duplicate Telegram report
        if: steps.collect.outputs.should_notify == 'true' && steps.telegram_cache.outputs.cache-hit == 'true'
        run: |
          echo "Telegram report already sent for this PR/head/check/comment state."