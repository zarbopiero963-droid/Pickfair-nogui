name: observability-tests

on:
  push:
    paths:
      - "observability/**"
      - "tests/observability/**"
      - "diagnostics/**"
      - "services/**"
      - "storage/**"
      - ".github/workflows/observability-tests.yml"
  pull_request:
    paths:
      - "observability/**"
      - "tests/observability/**"
      - "diagnostics/**"
      - "services/**"
      - "storage/**"
      - ".github/workflows/observability-tests.yml"
  workflow_dispatch:

jobs:
  observability:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-observability-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-observability-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pytest

      - name: Run observability suite
        run: |
          pytest tests/observability -q -x
