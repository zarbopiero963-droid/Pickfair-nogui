name: merge-simulation-hard

on:
  workflow_call:
  pull_request:
  workflow_dispatch:

jobs:
  simulate-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Simulate merge with main (fail-closed)
        run: |
          set -e
          git fetch origin main
          git checkout -b merge-sim-branch
          git merge --no-ff --no-edit origin/main || {
            echo "❌ MERGE CONFLICT DETECTED"
            exit 1
          }

      - name: Check merge markers
        run: |
          python scripts/check_merge_markers.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-xdist

      - name: Validate all guardrail JSON (fail if invalid)
        run: |
          python scripts/validate_guardrails.py

      - name: Run full pytest after merge simulation
        run: |
          pytest -q -x

      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-simulation-logs
          path: |
            .pytest_cache